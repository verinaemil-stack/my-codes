<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupons Pro</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#f5e9f2,#e6e7fb);
}

.header{
  padding:20px;
  background:linear-gradient(135deg,#e89abf,#9f8cff);
  color:#fff;
  border-bottom-left-radius:25px;
  border-bottom-right-radius:25px;
}

.header h3{
  margin:0;
  font-size:20px;
}

.search input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  outline:none;
  background:#ffffffdd;
}

.container{
  padding:15px;
}

.item{
  background:#faf7fb;
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.07);
  cursor:pointer;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:12px;
  object-fit:contain;
  background:#fff;
  padding:4px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.brand{
  font-size:15px;
  font-weight:600;
  color:#444;
}

.code{
  background:linear-gradient(135deg,#d16ba5,#8e7cff);
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
  font-size:13px;
}

.actions{
  display:flex;
  align-items:center;
  gap:8px;
}

button{
  border:none;
  border-radius:10px;
  padding:6px 9px;
  cursor:pointer;
  font-size:13px;
}

.copy{background:#f3d4e5}
.save{background:#ececf3}
.save.active{background:#ffd6ec}

.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#d16ba5;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}

</style>
</head>

<body>

<div class="header">
  <h3>💖 أكواد الخصم</h3>
  <div class="search">
    <input id="search" placeholder="ابحث عن متجر أو كود">
  </div>
</div>

<div class="container" id="list"></div>

<div class="toast" id="toast"></div>

<script>

const storeData = {
  "Namshi": {site:"https://en-ae.namshi.com", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Namshi_logo.svg"},
  "NOON": {site:"https://www.noon.com", logo:"https://upload.wikimedia.org/wikipedia/commons/2/2f/Noon_logo.svg"},
  "Styli": {site:"https://www.styli.com", logo:"https://seeklogo.com/images/S/styli-logo.png"},
  "Max Fashion": {site:"https://www.maxfashion.com", logo:"https://seeklogo.com/images/M/max-fashion-logo.png"},
  "Mumzworld": {site:"https://www.mumzworld.com", logo:"https://seeklogo.com/images/M/mumzworld-logo.png"},
  "Bloomingdale's": {site:"https://www.bloomingdales.ae", logo:"https://seeklogo.com/images/B/bloomingdales-logo.png"},
  "Eyewa": {site:"https://www.eyewa.com", logo:"https://seeklogo.com/images/E/eyewa-logo.png"},
  "Golden Scent": {site:"https://www.goldenscent.com", logo:"https://seeklogo.com/images/G/golden-scent-logo.png"}
};

const coupons = [
{brand:"Vogacloset",code:"GGG"},
{brand:"Vogacloset",code:"GM"},
{brand:"Mamas & Papas",code:"ADL12"},
{brand:"Styli",code:"TSSS"},
{brand:"Mumzworld",code:"ADL33"},
{brand:"NOON",code:"ZZZ10"},
{brand:"Namshi",code:"SW7"},
{brand:"Max Fashion",code:"ATRD"},
{brand:"Bloomingdale's",code:"ADL3"},
{brand:"Golden Scent",code:"G4WQ"}
];

let saved = JSON.parse(localStorage.getItem("savedCoupons")) || [];

function render(data){
  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(c=>{
    const info = storeData[c.brand] || {site:"#", logo:"https://via.placeholder.com/40"};

    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div class="left">
        <img class="logo" src="${info.logo}">
        <div class="brand">${c.brand}</div>
      </div>

      <div class="actions">
        <div class="code">${c.code}</div>
        <button class="save">⭐</button>
        <button class="copy">📋</button>
      </div>
    `;

    // فتح المتجر عند الضغط على الكارت (نفس التبويب)
    div.addEventListener("click", (e)=>{
      if(e.target.closest('button')) return;
      window.location.href = info.site;
    });

    // النسخ + توجيه مباشر للموقع (نفس التبويب)
    div.querySelector(".copy").addEventListener("click", (e)=>{
      e.stopPropagation();
      navigator.clipboard.writeText(c.code);
      toast("تم النسخ 💖");
      window.location.href = info.site;
    });

    // حفظ
    div.querySelector(".save").addEventListener("click", (e)=>{
      e.stopPropagation();
      if(!saved.find(s=>s.code===c.code)){
        saved.push(c);
        localStorage.setItem("savedCoupons",JSON.stringify(saved));
        toast("تم الحفظ ⭐");
      }
    });

    list.appendChild(div);
  });
}

function showAll(){render(coupons)}
function showSaved(){render(saved)}

// search

document.getElementById("search").oninput=(e)=>{
  const v=e.target.value.toLowerCase();
  render(coupons.filter(c=>
    c.brand.toLowerCase().includes(v)||c.code.toLowerCase().includes(v)
  ));
};

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

render(coupons);

</script>

</body>
</html>
